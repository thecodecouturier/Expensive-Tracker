<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Expense Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="auth-style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-key"></i>
                <h1>Forgot Password?</h1>
                <p>Enter your email to receive a reset link</p>
            </div>

            <form id="forgot-password-form" class="auth-form">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        Email Address
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="your@email.com" 
                        required
                        autocomplete="email"
                    >
                </div>

                <button type="submit" class="auth-btn" id="reset-btn">
                    <span>Send Reset Link</span>
                </button>

                <div class="auth-footer">
                    <p>Remember your password? <a href="login.html">Login here</a></p>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="auth.js"></script>
    <script>
        document.getElementById('forgot-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const resetBtn = document.getElementById('reset-btn');
            
            resetBtn.disabled = true;
            resetBtn.querySelector('span').innerHTML = '<div class="spinner"></div>';
            
            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showToast('Reset link sent! Check your email.', 'success');
                    // For demo purposes, show the reset URL
                    if (data.resetUrl) {
                        setTimeout(() => {
                            alert(`Demo: Reset URL: ${data.resetUrl}`);
                            window.location.href = data.resetUrl;
                        }, 2000);
                    }
                } else {
                    showToast(data.message || 'Failed to send reset link', 'error');
                    resetBtn.disabled = false;
                    resetBtn.querySelector('span').innerHTML = 'Send Reset Link';
                }
            } catch (error) {
                showToast('Network error. Please try again.', 'error');
                resetBtn.disabled = false;
                resetBtn.querySelector('span').innerHTML = 'Send Reset Link';
            }
        });
    </script>
</body>
</html>
