<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Expense Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="auth-style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-lock"></i>
                <h1>Reset Password</h1>
                <p>Enter your new password</p>
            </div>

            <form id="reset-password-form" class="auth-form">
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        New Password
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="At least 6 characters" 
                        required
                        minlength="6"
                    >
                </div>

                <div class="form-group">
                    <label for="confirm-password">
                        <i class="fas fa-lock"></i>
                        Confirm Password
                    </label>
                    <input 
                        type="password" 
                        id="confirm-password" 
                        placeholder="Confirm your password" 
                        required
                        minlength="6"
                    >
                </div>

                <button type="submit" class="auth-btn" id="reset-btn">
                    <span>Reset Password</span>
                </button>

                <div class="auth-footer">
                    <p>Remember your password? <a href="login.html">Login here</a></p>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="auth.js"></script>
    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const resetToken = urlParams.get('token');
        
        if (!resetToken) {
            showToast('Invalid reset link', 'error');
            setTimeout(() => window.location.href = 'login.html', 2000);
        }
        
        document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const resetBtn = document.getElementById('reset-btn');
            
            if (password !== confirmPassword) {
                return showToast('Passwords do not match', 'error');
            }
            
            resetBtn.disabled = true;
            resetBtn.querySelector('span').innerHTML = '<div class="spinner"></div>';
            
            try {
                const response = await fetch(`/api/auth/reset-password/${resetToken}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Save token and user info
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    showToast('Password reset successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showToast(data.message || 'Password reset failed', 'error');
                    resetBtn.disabled = false;
                    resetBtn.querySelector('span').innerHTML = 'Reset Password';
                }
            } catch (error) {
                showToast('Network error. Please try again.', 'error');
                resetBtn.disabled = false;
                resetBtn.querySelector('span').innerHTML = 'Reset Password';
            }
        });
    </script>
</body>
</html>
